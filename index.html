<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThMOvie (TMO) | Private Watch Party</title>
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon (Data URI kosong) -->
    <link rel="icon" href="data:,">

    <style>
        :root {
            /* Variabel Warna Mode Terang (Default) */
            --bg-color: #ffffff;
            --text-color: #333333;
            --secondary-bg: #f4f4f4;
            --accent-color: #ff0055;
            --border-color: #ddd;
            --chat-bg: #f9f9f9;
            --chat-input-bg: #eee;
            --input-text: #333;
            --error-color: #e74c3c;
        }

        /* Class untuk Mode Gelap (Saat Nonton) */
        body.dark-mode {
            --bg-color: #050505;
            --text-color: #ffffff;
            --secondary-bg: #121212;
            --accent-color: #ff0055;
            --border-color: #333;
            --chat-bg: #0a0a0a;
            --chat-input-bg: #1a1a1a;
            --input-text: #fff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background-color 0.8s ease, color 0.8s ease;
            height: 100vh;
            width: 100vw;
        }

        /* UI Setup Awal (Welcome Screen) */
        #setup-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: var(--bg-color);
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #setup-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .logo-area span {
            color: var(--accent-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: background 0.8s ease;
            width: 90%;
            max-width: 400px;
            align-items: center;
        }

        #movie-input {
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: 'Poppins', sans-serif;
            background: #fff;
            color: #333;
            transition: border-color 0.3s;
        }

        #movie-input:focus {
            border-color: var(--accent-color);
        }

        #start-btn {
            padding: 15px 30px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        #start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        /* Pesan Error Inline */
        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            height: 20px; /* Space reservasi */
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }
        .error-msg.visible {
            opacity: 1;
        }

        /* Container Utama Bioskop */
        .cinema-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            opacity: 0; /* Tersembunyi saat awal */
            transition: opacity 1s ease;
        }

        .cinema-container.active {
            opacity: 1;
        }

        /* Area Video */
        .video-section {
            flex: 3;
            position: relative;
            background: #000; /* Video area selalu hitam */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        /* Overlay Transparan (Anti-Pause visual layer jika diperlukan) */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: default;
        }

        /* Watermark Kecil di pojok */
        .watermark {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            letter-spacing: 1px;
        }

        /* Area Chat */
        .chat-section {
            flex: 1;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            transition: background 0.8s ease, border-color 0.8s ease;
            min-width: 300px;
            max-width: 400px;
        }

        .chat-header {
            padding: 15px;
            background: var(--secondary-bg);
            text-align: center;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.8s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        /* Style pesan chat */
        .msg {
            background: var(--secondary-bg);
            padding: 10px 14px;
            border-radius: 12px;
            border-top-left-radius: 2px;
            align-self: flex-start;
            max-width: 90%;
            color: var(--text-color);
            transition: background 0.8s ease, color 0.8s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            line-height: 1.4;
        }

        .msg.system {
            background: transparent;
            color: #888;
            font-style: italic;
            font-size: 0.85em;
            align-self: center;
            text-align: center;
            box-shadow: none;
            padding: 5px;
        }

        .chat-input {
            padding: 15px;
            background: var(--secondary-bg);
            display: flex;
            border-top: 1px solid var(--border-color);
            transition: background 0.8s ease;
        }

        .chat-input input {
            flex: 1;
            background: var(--chat-input-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--input-text);
            border-radius: 25px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .chat-input input:focus {
            border-color: var(--accent-color);
        }

        /* Responsif Mobile */
        @media (max-width: 768px) {
            .cinema-container {
                flex-direction: column;
            }
            .chat-section {
                height: 40vh;
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border-color);
                max-width: none;
            }
            .logo-area h1 {
                font-size: 2rem;
            }
            .input-group {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Layar Setup / Awal -->
    <div id="setup-screen">
        <div class="logo-area">
            <h1>Th<span>MOvie</span></h1>
            <p style="margin-top: -10px; color: #666; font-weight: 300;">Private Cinema Experience</p>
        </div>
        
        <div class="input-group">
            <div style="width: 100%; text-align: left; font-size: 0.9rem; margin-bottom: 5px; color: var(--text-color);">YouTube Video ID</div>
            <input type="text" id="movie-input" placeholder="Contoh: dqw4w9WgXcQ">
            <div id="error-display" class="error-msg">ID tidak boleh kosong!</div>
            <button id="start-btn">MULAI NONTON</button>
        </div>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #999; opacity: 0.7;">System will dim lights automatically.</p>
    </div>

    <!-- Container Utama Bioskop -->
    <div class="cinema-container" id="cinema-ui">
        <!-- Area Video -->
        <div class="video-section">
            <div class="watermark">TMO CINEMA</div>
            <!-- Overlay ini menangkap klik jika kita ingin mencegah pause melalui klik -->
            <div class="video-overlay" id="blocker"></div> 
            <div id="player"></div>
        </div>

        <!-- Area Chat -->
        <div class="chat-section">
            <div class="chat-header">Live Interaction</div>
            <div class="chat-messages" id="chat-box">
                <div class="msg system">Terhubung ke server TMO... 👋</div>
                <div class="msg system">Menunggu pemutaran dimulai.</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-text" placeholder="Ketik pesan..." autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        var introId = '9v1atEBmUIc'; // ID Video Intro VowViw / Cinema Intro
        var movieId = ''; 
        var hasStarted = false; 

        // --- DOM ELEMENTS ---
        const setupScreen = document.getElementById('setup-screen');
        const cinemaUI = document.getElementById('cinema-ui');
        const startBtn = document.getElementById('start-btn');
        const movieInput = document.getElementById('movie-input');
        const errorDisplay = document.getElementById('error-display');
        const chatInput = document.getElementById('chat-text');
        const chatBox = document.getElementById('chat-box');

        // --- EVENT LISTENERS ---
        
        // Validasi Input Sederhana
        movieInput.addEventListener('input', function() {
            if(this.value.trim() !== '') {
                errorDisplay.classList.remove('visible');
                this.style.borderColor = 'var(--border-color)';
            }
        });

        // Tombol Mulai
        startBtn.addEventListener('click', function() {
            const inputVal = movieInput.value.trim();
            if(!inputVal) {
                // Tampilkan error inline, bukan alert
                errorDisplay.textContent = "Mohon masukkan ID YouTube terlebih dahulu!";
                errorDisplay.classList.add('visible');
                movieInput.style.borderColor = 'var(--error-color)';
                movieInput.focus();
                return;
            }
            movieId = inputVal;
            startCinema();
        });

        // Chat Interaction
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                addMessage("Anda", this.value);
                this.value = '';
            }
        });

        // --- FUNGSI UTAMA ---

        function startCinema() {
            if(hasStarted) return;
            hasStarted = true;

            // 1. Ubah body jadi dark mode
            document.body.classList.add('dark-mode');

            // 2. Sembunyikan layar setup
            setupScreen.classList.add('hidden');

            // 3. Tampilkan UI Cinema
            setTimeout(() => {
                cinemaUI.classList.add('active');
                // Pastikan player di-resize dengan benar saat container muncul
                if(player && typeof player.setSize === 'function') {
                    player.setSize(window.innerWidth * 0.75, window.innerHeight); // Perkiraan awal
                }
                initPlayer();
            }, 800); // Delay sedikit lebih lama agar transisi dark mode selesai
        }

        // --- YOUTUBE API LOGIC ---

        // Load API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;

        function initPlayer() {
            if (typeof YT !== 'undefined' && YT.Player) {
                createPlayer();
            }
        }

        // Callback otomatis dari YouTube API
        function onYouTubeIframeAPIReady() {
            // Jika user sudah klik start sebelum API siap
            if (hasStarted) {
                createPlayer();
            }
        }

        function createPlayer() {
            // Perbaikan sesuai request:
            // 1. Menggunakan window.location.origin agar fleksibel di Vercel/Localhost
            // 2. Menambahkan enablejsapi: 1
            player = new YT.Player('player', {
                videoId: introId, 
                playerVars: {
                    'autoplay': 1,
                    'controls': 1, 
                    'rel': 0,
                    'disablekb': 1, // Disable keyboard shortcut (optional, untuk cinema feel)
                    'fs': 1,
                    'modestbranding': 1,
                    'origin': window.location.origin, 
                    'enablejsapi': 1, // API JS aktif sempurna
                    'widgetid': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function onPlayerError(event) {
            console.error("Player Error:", event.data);
            let msg = "Terjadi kesalahan video.";
            if(event.data === 2) msg = "Parameter ID Video tidak valid.";
            if(event.data === 100) msg = "Video tidak ditemukan atau telah dihapus.";
            if(event.data === 101 || event.data === 150) msg = "Video ini tidak diizinkan untuk embed di situs lain.";
            addSystemMessage("Error: " + msg);
        }

        // --- LOGIKA UTAMA (GABUNGAN) ---
        function onPlayerStateChange(event) {
            try {
                // Ambil data video dengan aman
                let videoData = player.getVideoData();
                let currentVideoId = videoData ? videoData.video_id : null;

                // 1. Logika Perpindahan Video (Intro ke Film)
                if (event.data == YT.PlayerState.ENDED) {
                    if (currentVideoId === introId && movieId) {
                        addSystemMessage("Intro selesai. Menikmati film utama...");
                        player.loadVideoById(movieId);
                    } else if (currentVideoId === movieId) {
                        addSystemMessage("Film telah selesai. Sampai jumpa di pemutaran berikutnya!");
                    }
                }

                // 2. Proteksi Anti-Pause (Dengan Delay 200ms)
                // Delay penting agar sistem YouTube tidak mendeteksi sebagai bot/spamming play
                if (event.data == YT.PlayerState.PAUSED) {
                    setTimeout(() => {
                        // Cek ulang status player setelah delay
                        if (player && player.getPlayerState() === YT.PlayerState.PAUSED) {
                            player.playVideo();
                            console.log("TMO Anti-Pause: Force playing...");
                        }
                    }, 200);
                }
            } catch (e) {
                console.warn("State Change Error: ", e);
            }
        }

        // --- CHAT SYSTEM ---

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            // Menambahkan style bold untuk sender
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg system';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Resize handler untuk responsif
        window.addEventListener('resize', () => {
            if (player && player.setSize) {
                // Opsional: trigger resize ulang jika layout berubah drastis
                // Biasanya API iframe YouTube handle ini otomatis dengan CSS width: 100%
            }
        });

    </script>

</body>
</html>
