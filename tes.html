<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThMovie - TMO Cinema</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .cinema-header {
            margin-bottom: 25px;
        }
        h1 {
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .vowviw-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 56.25%; /* Rasio 16:9 biar cinematic */
            height: 0;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            overflow: hidden;
            border: 2px solid #222;
        }
        .vowviw-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="cinema-header">
        <h1>🎬 ThMovie (TMO)</h1>
        <p>VowViw Entertainment - Pengalaman Bioskop Digital</p>
    </div>

    <div class="vowviw-container">
        <iframe 
            src="https://drive.google.com/file/d/1tqBTAqkhx0oPFHknnCAa5AxfMK-RvJh2/preview" 
            allow="autoplay"
            allowfullscreen>
        </iframe>
    </div>

    <div class="footer">
        <p>&copy; 2026 ThMovie Production by Gilang</p>
    </div>

</body>
</html>
