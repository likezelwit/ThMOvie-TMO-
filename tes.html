<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThMovie - Inside Out (Real-time)</title>
    <!-- Library Ably buat sinkronisasi nobar -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .cinema-header { margin-bottom: 25px; }
        .vowviw-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 150, 255, 0.3); overflow: hidden; border: 2px solid #222; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
        .footer { margin-top: 30px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <div class="cinema-header">
        <h1>🎬 ThMovie (TMO)</h1>
        <p>Sekarang Memutar: Inside Out (2015)</p>
    </div>

    <div class="vowviw-container">
        <!-- Video Player TMO - Hapus crossorigin="anonymous" buat hindari blokir CORS -->
        <video id="tmo-player" controls>
            <source src="https://www.dropbox.com/scl/fi/1au84x7468vxi1jib88x0/Inside-Out-2015.mp4?rlkey=m0xoy2zfss4y1n4oi5tuila4i&st=3pgco0lj&raw=1" type="video/mp4">
            Browser lo gak kuat muter film ini.
        </video>
    </div>

    <div class="footer">
        <p>&copy; 2026 ThMovie Production by Gilang - Kelas VI A</p>
    </div>

    <script>
        // Pakai Root Key lo buat kontrol penuh
        const ably = new Ably.Realtime('4PuneA.m9z7NA:9tNxlKi-0-BnCULHgl54eS8A7agg3ivOQMiVisCncCI');
        const channel = ably.channels.get('tmo-nobar');
        const video = document.getElementById('tmo-player');

        // FLAG biar gak terjadi looping sinyal (sinyal balik)
        let isReceiving = false;

        // Kirim sinyal pas lo klik Play/Pause/Seek
        video.onplay = () => {
            if (!isReceiving) {
                channel.publish('sync', { action: 'play', time: video.currentTime });
            }
        };

        video.onpause = () => {
            if (!isReceiving) {
                channel.publish('sync', { action: 'pause', time: video.currentTime });
            }
        };

        video.onseeked = () => {
            if (!isReceiving) {
                channel.publish('sync', { action: 'seek', time: video.currentTime });
            }
        };

        // Terima sinyal dari temen-temen
        channel.subscribe('sync', (message) => {
            const data = message.data;
            isReceiving = true; // Kunci biar video.onplay gak ngirim balik sinyal

            // Samain waktu kalau selisihnya jauh
            if (Math.abs(video.currentTime - data.time) > 1.0) {
                video.currentTime = data.time;
            }

            if (data.action === 'play') {
                video.play().catch(() => {
                    console.log("Browser blokir autoplay, user harus klik sekali");
                });
            } else if (data.action === 'pause') {
                video.pause();
            }

            // Buka kunci setelah selesai proses
            setTimeout(() => { isReceiving = false; }, 500);
        });
    </script>
</body>
</html>
