<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThMovie - Google Drive Sync</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .cinema-header { margin-bottom: 25px; }
        .vowviw-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 150, 255, 0.3); overflow: hidden; border: 2px solid #222; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
        .footer { margin-top: 30px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <div class="cinema-header">
        <h1>🎬 ThMovie (TMO)</h1>
        <p>Streaming via Google Drive - Real-time Mode</p>
    </div>

    <div class="vowviw-container">
        <!-- Tag video menggunakan link Direct Download Google Drive -->
        <video id="tmo-player" controls>
            <source src="https://docs.google.com/uc?export=download&id=1tqBTAqkhx0oPFHknnCAa5AxfMK-RvJh2" type="video/mp4">
            Browser lo gak support tag video.
        </video>
    </div>

    <div class="footer">
        <p>&copy; 2026 ThMovie Production by Gilang - Kelas VI A</p>
    </div>

    <script>
        const ably = new Ably.Realtime('4PuneA.m9z7NA:9tNxlKi-0-BnCULHgl54eS8A7agg3ivOQMiVisCncCI');
        const channel = ably.channels.get('tmo-nobar');
        const video = document.getElementById('tmo-player');

        let isReceiving = false;

        video.onplay = () => { if (!isReceiving) channel.publish('sync', { action: 'play', time: video.currentTime }); };
        video.onpause = () => { if (!isReceiving) channel.publish('sync', { action: 'pause', time: video.currentTime }); };
        video.onseeked = () => { if (!isReceiving) channel.publish('sync', { action: 'seek', time: video.currentTime }); };

        channel.subscribe('sync', (message) => {
            const data = message.data;
            isReceiving = true;
            if (Math.abs(video.currentTime - data.time) > 1.0) video.currentTime = data.time;
            data.action === 'play' ? video.play() : video.pause();
            setTimeout(() => { isReceiving = false; }, 500);
        });
    </script>
</body>
</html>
