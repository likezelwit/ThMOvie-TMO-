<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThMovie - TMO Cinema</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .cinema-header {
            margin-bottom: 20px;
        }
        .vowviw-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
            background: #000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            overflow: hidden;
        }
        .vowviw-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="cinema-header">
        <h1>🎬 ThMovie (TMO)</h1>
        <p>VowViw Entertainment - Menampilkan Film Terpopuler</p>
    </div>

    <!-- Container Iframe Bioskop -->
    <div class="vowviw-container">
        <iframe 
            src="https://mega.nz/embed/hMU1iYjA#79zhwr0hij96jcpqqfdya-X7yIuCdTxdrOaJx0ZtHXo" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="footer">
        <p>&copy; 2026 ThMovie Production by Gilang</p>
    </div>

</body>
</html>
